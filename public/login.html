<!DOCTYPE html>
<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Iniciar Sesión - Padel@Home</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
<link rel="manifest" href="/manifest.json">
<script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#0EA5E9", // Sky blue for a sporty/fresh feel
              secondary: "#0F172A", // Dark slate for contrast
              "background-light": "#F8FAFC", // Slate 50
              "background-dark": "#0F172A", // Slate 900
              "surface-light": "#FFFFFF",
              "surface-dark": "#1E293B",
            },
            fontFamily: {
              display: ["Inter", "sans-serif"],
              body: ["Inter", "sans-serif"],
            },
            borderRadius: {
              DEFAULT: "0.5rem",
              xl: "1rem",
            },
          },
        },
      };
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col justify-center items-center p-4 transition-colors duration-300 relative overflow-hidden">
<div class="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none z-0">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/20 dark:bg-primary/10 rounded-full blur-[100px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-blue-400/20 dark:bg-blue-500/10 rounded-full blur-[100px]"></div>
</div>
<div class="bg-surface-light dark:bg-surface-dark shadow-2xl rounded-xl w-full max-w-md p-8 sm:p-10 relative z-10 border border-slate-100 dark:border-slate-700">
<div class="text-center mb-8">
<div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-primary/10 text-primary mb-4 dark:bg-primary/20">
<span class="material-icons-round text-2xl">sports_tennis</span>
</div>
<h1 class="text-3xl font-bold text-slate-900 dark:text-white mb-2 tracking-tight">Iniciar Sesión</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm">
                Bienvenido a <span class="font-semibold text-primary">Padel@Home</span>
</p>
</div>
<form id="login-form" action="#" class="space-y-6" method="POST">
<div>
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2" for="email">
                    Correo Electrónico
                </label>
<div class="relative rounded-md shadow-sm">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-icons-round text-slate-400 text-xl">email</span>
</div>
<input class="block w-full pl-10 pr-3 py-2.5 border border-slate-300 dark:border-slate-600 rounded-lg text-slate-900 dark:text-white placeholder-slate-400 focus:ring-2 focus:ring-primary focus:border-primary sm:text-sm bg-white dark:bg-slate-800 transition-shadow duration-200" id="email" name="email" placeholder="ejemplo@padelhome.com" required="" type="email"/>
</div>
</div>
<div>
<div class="flex items-center justify-between mb-2">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300" for="password">
                        Contraseña
                    </label>
</div>
<div class="relative rounded-md shadow-sm">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-icons-round text-slate-400 text-xl">lock</span>
</div>
<input class="block w-full pl-10 pr-3 py-2.5 border border-slate-300 dark:border-slate-600 rounded-lg text-slate-900 dark:text-white placeholder-slate-400 focus:ring-2 focus:ring-primary focus:border-primary sm:text-sm bg-white dark:bg-slate-800 transition-shadow duration-200" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<div class="flex items-center justify-between text-sm">
<div class="flex items-center">
<input class="h-4 w-4 text-primary focus:ring-primary border-slate-300 rounded dark:bg-slate-700 dark:border-slate-600" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block text-slate-700 dark:text-slate-300" for="remember-me">
                        Recuérdame
                    </label>
</div>
</div>
<div>
<button class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-primary hover:bg-sky-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all duration-200 transform active:scale-[0.98]" type="submit">
                    Iniciar Sesión
                </button>
</div>
</form>

<p id="error-message" class="text-red-500 text-sm mt-4 text-center hidden"></p>

<div class="mt-8 text-center border-t border-slate-100 dark:border-slate-700 pt-6">
<p class="text-sm text-slate-600 dark:text-slate-400">
                ¿Olvidaste tu contraseña?
                <a class="font-medium text-primary hover:text-sky-600 transition-colors ml-1" href="/reset-password.html">
                    Restablécela aquí
                </a>
</p>
<p id="register-link-container" class="text-sm text-slate-600 dark:text-slate-400 mt-2" style="display: none;">
    ¿No tienes una cuenta?
    <a class="font-medium text-primary hover:text-sky-600 transition-colors ml-1" href="/register.html">
        Regístrate aquí
    </a>
</p>
</div>
</div>
<footer class="mt-8 text-center text-slate-400 dark:text-slate-600 text-xs z-10">
        © 2024 Padel@Home. Gestión de Reservas.
    </footer>

    <script type="module" src="login.js"></script>
    <script src="main.js"></script>
</body></html>
