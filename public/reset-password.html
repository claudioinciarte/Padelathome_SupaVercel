<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Restablecer Contraseña - Padel@Home</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
<link rel="manifest" href="/manifest.json">
<script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#2563EB", // Royal blue
              secondary: "#0F172A", // Dark slate
              "background-light": "#F8FAFC", // Slate 50
              "background-dark": "#0F172A", // Slate 900
              "surface-light": "#FFFFFF",
              "surface-dark": "#1E293B",
            },
            fontFamily: {
              display: ["Inter", "sans-serif"],
              body: ["Inter", "sans-serif"],
            },
            borderRadius: {
              DEFAULT: "0.5rem",
              xl: "1rem",
            },
          },
        },
      };
    </script>
<style>
    body { font-family: 'Inter', sans-serif; }
</style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col justify-center items-center p-4 transition-colors duration-300 relative overflow-hidden">
<div class="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none z-0">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/20 dark:bg-primary/10 rounded-full blur-[100px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-blue-400/20 dark:bg-blue-500/10 rounded-full blur-[100px]"></div>
</div>

<div class="bg-surface-light dark:bg-surface-dark shadow-2xl rounded-xl w-full max-w-md p-8 sm:p-10 relative z-10 border border-slate-100 dark:border-slate-700">
    <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-primary/10 text-primary mb-4 dark:bg-primary/20">
            <span class="material-icons-round text-2xl">lock_reset</span>
        </div>
        <h1 class="text-3xl font-bold text-slate-900 dark:text-white mb-2 tracking-tight">Nueva Contraseña</h1>
        <p class="text-slate-500 dark:text-slate-400 text-sm">
            Establece una nueva contraseña para tu cuenta.
        </p>
    </div>

    <form id="reset-password-form" class="space-y-6">
        <div>
            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2" for="password">Nueva Contraseña</label>
            <div class="relative rounded-md shadow-sm">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <span class="material-icons-round text-slate-400 text-xl">lock</span>
                </div>
                <input class="block w-full pl-10 pr-3 py-2.5 border border-slate-300 dark:border-slate-600 rounded-lg text-slate-900 dark:text-white placeholder-slate-400 focus:ring-2 focus:ring-primary focus:border-primary sm:text-sm bg-white dark:bg-slate-800 transition-shadow duration-200" id="password" required type="password" placeholder="••••••••"/>
            </div>
        </div>

        <div>
            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2" for="confirm-password">Confirmar Contraseña</label>
            <div class="relative rounded-md shadow-sm">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <span class="material-icons-round text-slate-400 text-xl">lock_outline</span>
                </div>
                <input class="block w-full pl-10 pr-3 py-2.5 border border-slate-300 dark:border-slate-600 rounded-lg text-slate-900 dark:text-white placeholder-slate-400 focus:ring-2 focus:ring-primary focus:border-primary sm:text-sm bg-white dark:bg-slate-800 transition-shadow duration-200" id="confirm-password" required type="password" placeholder="••••••••"/>
            </div>
        </div>

        <div>
            <button class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-primary hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all duration-200 transform active:scale-[0.98]" type="submit">
                Guardar Contraseña
            </button>
        </div>
    </form>

    <p id="message" class="text-center text-sm mt-4 hidden"></p>

    <div class="mt-8 text-center border-t border-slate-100 dark:border-slate-700 pt-6">
         <a class="text-sm font-medium text-slate-600 dark:text-slate-400 hover:text-primary transition-colors flex items-center justify-center" href="/login.html">
             <span class="material-icons-round text-base mr-1">arrow_back</span>
             Volver al Inicio de Sesión
         </a>
    </div>
</div>

<footer class="mt-8 text-center text-slate-400 dark:text-slate-600 text-xs z-10">
    © 2024 Padel@Home. Gestión de Reservas.
</footer>

<script src="reset-password.js"></script>
<script src="main.js"></script>
</body>
</html>
